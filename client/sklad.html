<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад — управление товарами и закупками</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">С</div>
            <div class="brand-text">
                <div class="brand-title">Склад</div>
                <div class="brand-subtitle">v1.0</div>
            </div>
        </div>

        <!-- Возврат в основную систему Invisible Doors -->
        <div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08)">
            <a href="index.html" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(192,57,43,.15);color:#fff;text-decoration:none;border-radius:4px;font-size:12px;font-weight:600;border-left:3px solid #c0392b">
                <span>←</span><span>К основной системе</span>
            </a>
        </div>

        <nav class="nav">
            <div class="nav-group">
                <div class="nav-group-title">Справочники</div>
                <a href="#" class="nav-item" data-view="warehouses">
                    <span class="nav-icon">🏭</span>Склады
                </a>
                <a href="#" class="nav-item" data-view="products">
                    <span class="nav-icon">📦</span>Товары
                </a>
                <a href="#" class="nav-item" data-view="purchasing">
                    <span class="nav-icon">🛒</span>Закупки
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Документы</div>
                <a href="#" class="nav-item" data-view="purchases">
                    <span class="nav-icon">📥</span>Поступления
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Отчёты</div>
                <a href="#" class="nav-item" data-view="stock">
                    <span class="nav-icon">📊</span>Остатки
                </a>
                <a href="#" class="nav-item" data-view="turnover">
                    <span class="nav-icon">📈</span>Обороты
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Сервис</div>
                <a href="#" class="nav-item" data-view="settings">
                    <span class="nav-icon">⚙️</span>Настройки
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <button id="seed-btn" class="btn btn-ghost btn-small">Демо-данные</button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 id="view-title">Склад</h1>
            <div class="topbar-actions" id="view-actions"></div>
        </header>

        <section class="content" id="content"></section>
    </main>

    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modal-title">Заголовок</h2>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <div class="modal-backdrop modal-backdrop-2" id="modal-backdrop-2">
        <div class="modal" id="modal-2">
            <div class="modal-header">
                <h2 id="modal-title-2">Заголовок</h2>
                <button class="modal-close" id="modal-close-2">×</button>
            </div>
            <div class="modal-body" id="modal-body-2"></div>
            <div class="modal-footer" id="modal-footer-2"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="storage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
